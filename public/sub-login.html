<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — RootACE Active Optimization</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F8FAFC; --dark: #0B0F1A; --accent: #2563EB; --accent-light: #3B82F6;
      --muted: #64748B; --border: #CBD5E1; --sans: 'Inter', system-ui, sans-serif;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--dark); -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }

    nav {
      display: flex; align-items: center; justify-content: center;
      padding: 0 48px; height: 60px; background: var(--dark);
    }
    .nav-logo { text-decoration: none; display: flex; align-items: center; }
    .nav-logo-root { font-size: 18px; font-weight: 700; color: #fff; }
    .nav-logo-ace { font-size: 18px; font-weight: 800; color: #2563EB; }

    .page-center { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 20px; }
    .card {
      background: #fff; border: 1px solid #E2E8F0; border-radius: 14px;
      padding: 44px 40px; max-width: 400px; width: 100%;
    }
    .card-tag {
      font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--accent); margin-bottom: 12px;
    }
    .card h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 8px; }
    .card .sub { font-size: 14px; color: var(--muted); line-height: 1.6; margin-bottom: 32px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
    .form-group input {
      width: 100%; font-family: var(--sans); font-size: 14px; color: var(--dark);
      border: 1px solid var(--border); border-radius: 6px; padding: 11px 14px;
      outline: none; transition: border-color 0.2s; background: var(--bg);
    }
    .form-group input:focus { border-color: var(--accent); background: #fff; }

    .submit-btn {
      width: 100%; background: var(--accent); color: #fff; font-family: var(--sans);
      font-size: 15px; font-weight: 600; padding: 13px; border-radius: 8px; border: none;
      cursor: pointer; transition: background 0.2s; margin-top: 8px;
    }
    .submit-btn:hover:not(:disabled) { background: var(--accent-light); }
    .submit-btn:disabled { opacity: 0.65; cursor: not-allowed; }

    .error-msg {
      background: #FEF2F2; border: 1px solid #FCA5A5; border-radius: 6px;
      padding: 12px; font-size: 13px; color: #DC2626; margin-bottom: 16px; display: none;
    }

    .divider { border: none; border-top: 1px solid #F1F5F9; margin: 24px 0; }
    .footer-links { text-align: center; font-size: 13px; color: var(--muted); }
    .footer-links a { color: var(--accent); text-decoration: none; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">
    <span class="nav-logo-root">Root</span><span class="nav-logo-ace">ACE</span>
  </a>
</nav>

<div class="page-center">
  <div class="card">
    <div class="card-tag">Active Optimization</div>
    <h1>Welcome back.</h1>
    <p class="sub">Sign in to your subscriber account to run a new audit or view your history.</p>

    <div class="error-msg" id="errorMsg"></div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="you@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Your password" required autocomplete="current-password" />
      </div>
      <button type="submit" class="submit-btn" id="submitBtn">Sign in →</button>
    </form>

    <div style="text-align:right;margin-top:10px;">
      <a href="/sub-forgot-password.html" style="font-size:13px;color:var(--muted);text-decoration:none;">Forgot password?</a>
    </div>

    <hr class="divider" />

    <div class="footer-links">
      Not subscribed yet? <a href="/subscribe.html">Start Active Optimization →</a>
    </div>
  </div>
</div>

<script>
  // Redirect if already logged in
  const existing = localStorage.getItem('sub_token');
  if (existing) window.location.href = '/sub-dashboard.html';

  const form = document.getElementById('loginForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorMsg.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Signing in…';

    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    try {
      const resp = await fetch('/api/sub-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await resp.json();

      if (!resp.ok) {
        if (data.canceled) {
          errorMsg.innerHTML = data.error + ' <a href="/subscribe.html" style="color:#2563EB;">Resubscribe →</a>';
        } else {
          errorMsg.textContent = data.error || 'Sign in failed. Please try again.';
        }
        errorMsg.style.display = 'block';
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign in →';
        return;
      }

      localStorage.setItem('sub_token', data.token);
      localStorage.setItem('sub_email', data.email);
      window.location.href = '/sub-dashboard.html';

    } catch (err) {
      errorMsg.textContent = 'Network error. Please try again.';
      errorMsg.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = 'Sign in →';
    }
  });
</script>
