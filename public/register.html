<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | Root</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F0E8; --surface: #FAF7F2; --ink: #1A1A18; --ink-2: #3D3D3B;
      --mid: #6B6B67; --quiet: #9E9E9A; --border: rgba(26,26,24,0.1);
      --green: #1D9E75; --green-d: #723D22; --green-bg: rgba(29,158,117,0.08);
      --red: #C0392B; --red-bg: rgba(192,57,43,0.07);
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }
    nav { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 48px; height: 60px; display: flex; align-items: center; }
    .nav-logo { font-family: var(--serif); font-size: 22px; font-style: italic; text-decoration: none; color: var(--ink); }
    .nav-logo em { font-style: normal; color: var(--green); }

    .page { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 60px); padding: 48px 24px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 48px; width: 100%; max-width: 440px; }

    .card-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 12px; }
    .card-title { font-family: var(--serif); font-size: 30px; margin-bottom: 8px; }
    .card-sub { color: var(--mid); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    input { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 15px; color: var(--ink); background: var(--bg); outline: none; transition: border-color 0.15s; }
    input:focus { border-color: var(--green); background: var(--surface); }
    input::placeholder { color: var(--quiet); }

    .hint { font-size: 12px; color: var(--quiet); margin-top: 5px; }

    .btn-primary { width: 100%; padding: 13px; background: var(--green); color: white; border: none; border-radius: 8px; font-family: var(--sans); font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
    .btn-primary:hover:not(:disabled) { background: var(--green-d); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg { background: var(--red-bg); border: 1px solid rgba(192,57,43,0.2); color: var(--red); border-radius: 8px; padding: 12px 14px; font-size: 14px; margin-bottom: 20px; display: none; }
    .divider { text-align: center; color: var(--quiet); font-size: 13px; margin: 24px 0; }
    .login-link { text-align: center; font-size: 14px; color: var(--mid); }
    .login-link a { color: var(--green); text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }

    .spin { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .audit-notice { background: var(--green-bg); border: 1px solid rgba(29,158,117,0.2); border-radius: 10px; padding: 14px 16px; margin-bottom: 28px; font-size: 13px; color: var(--ink-2); line-height: 1.5; }
    .audit-notice strong { color: var(--green); }
  </style>
</head>
<body>
<nav><a class="nav-logo" href="/" style="font-family:var(--serif);font-size:22px;font-style:normal;text-decoration:none;color:var(--ink)"><span style="font-family:var(--serif);font-weight:700;font-style:normal;color:var(--ink)">Root</span><span style="font-family:var(--serif);font-weight:400;font-style:italic;color:#8B4A2A">ACE</span></a></nav>

<div class="page">
  <div class="card">
    <div class="card-eyebrow">New Account</div>
    <div class="card-title">Create your account</div>
    <div class="card-sub">Access your audit reports and manage your subscription.</div>

    <div id="audit-notice" class="audit-notice" style="display:none">
      Your <strong>Competitive AI Audit</strong> is ready. Create an account to save it and access it anytime.
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
      <div class="hint">Use a strong password you don't use elsewhere.</div>
    </div>
    <div class="field">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password" />
    </div>

    <button class="btn-primary" id="submit-btn" onclick="register()">Create account</button>

    <div class="divider">or</div>
    <div class="login-link">Already have an account? <a id="login-link" href="/login-customer.html">Log in</a></div>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const resultId = params.get('resultId');
  const prefillEmail = params.get('email');

  // Pre-fill email from purchase if provided
  if (prefillEmail) {
    document.getElementById('email').value = decodeURIComponent(prefillEmail);
  }

  // Show audit notice if coming from post-audit flow
  if (resultId) {
    document.getElementById('audit-notice').style.display = 'block';
    // Keep resultId in login link too
    document.getElementById('login-link').href = `/login-customer.html?resultId=${encodeURIComponent(resultId)}${prefillEmail ? '&email=' + encodeURIComponent(prefillEmail) : ''}`;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function register() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const btn = document.getElementById('submit-btn');
    const errEl = document.getElementById('error-msg');
    errEl.style.display = 'none';

    if (!email || !password) return showError('Please fill in all fields.');
    if (password !== confirm) return showError('Passwords do not match.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Creating account...';

    try {
      const res = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');

      // Store session
      localStorage.setItem('rp_customer_token', data.token);
      localStorage.setItem('rp_customer_email', data.email);

      // Link audit if coming from post-audit flow
      if (resultId) {
        try {
          await fetch('/api/link-audit', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${data.token}`,
            },
            body: JSON.stringify({ resultId }),
          });
        } catch { /* non-fatal */ }
      }

      location.href = '/dashboard.html';
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }

  // Allow Enter key
  document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
