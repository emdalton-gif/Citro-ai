<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account | RootACE</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:          #F8FAFC;
      --surface:     #FFFFFF;
      --ink:         #0F172A;
      --ink-2:       #1E293B;
      --mid:         #64748B;
      --quiet:       #94A3B8;
      --border:      rgba(15,23,42,0.08);
      --accent:      #2563EB;
      --accent-d:    #1D4ED8;
      --accent-light:rgba(37,99,235,0.08);
      --accent-ring: rgba(37,99,235,0.18);
      --red:         #DC2626;
      --red-bg:      rgba(220,38,38,0.06);
      --sans:        'Inter', system-ui, sans-serif;
      --mono:        'DM Mono', monospace;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    nav {
      background: rgba(248,250,252,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
    }
    .nav-logo { text-decoration: none; display: flex; align-items: center; }
    .logo-root { font-size: 18px; font-weight: 600; color: var(--ink); letter-spacing: -0.3px; }
    .logo-ace  { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; }

    .page { display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 64px); padding: 48px 24px; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 1px 4px rgba(15,23,42,0.06);
    }

    .card-eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 12px;
    }
    .card-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.4px;
      margin-bottom: 8px;
    }
    .card-sub { color: var(--mid); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }

    .field { margin-bottom: 20px; }
    label { display: block; font-size: 13px; font-weight: 500; color: var(--ink-2); margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 15px;
      color: var(--ink);
      background: var(--bg);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-ring); background: var(--surface); }
    input::placeholder { color: var(--quiet); }
    .hint { font-size: 12px; color: var(--quiet); margin-top: 5px; }

    .btn-primary {
      width: 100%;
      padding: 13px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: var(--sans);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s;
      letter-spacing: -0.1px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--accent-d); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: var(--red-bg);
      border: 1px solid rgba(220,38,38,0.18);
      color: var(--red);
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .divider { text-align: center; color: var(--quiet); font-size: 13px; margin: 24px 0; }
    .login-link { text-align: center; font-size: 14px; color: var(--mid); }
    .login-link a { color: var(--accent); text-decoration: none; font-weight: 500; }
    .login-link a:hover { text-decoration: underline; }

    .audit-notice {
      background: var(--accent-light);
      border: 1px solid rgba(37,99,235,0.18);
      border-radius: 8px;
      padding: 13px 15px;
      margin-bottom: 24px;
      font-size: 13px;
      color: var(--ink-2);
      line-height: 1.5;
    }
    .audit-notice strong { color: var(--accent); }

    .spin { display: inline-block; width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.4); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 480px) { .card { padding: 32px 24px; } nav { padding: 0 20px; } }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <span class="logo-root">Root</span><span class="logo-ace">ACE</span>
  </a>
</nav>

<div class="page">
  <div class="card">
    <div class="card-eyebrow">New Account</div>
    <div class="card-title">Create your account</div>
    <div class="card-sub">Access your audit reports anytime and track your visibility over time.</div>

    <div id="audit-notice" class="audit-notice" style="display:none">
      Your <strong>AI Visibility Audit</strong> is ready. Create an account to save it and access it anytime.
    </div>

    <div id="error-msg" class="error-msg"></div>

    <div class="field">
      <label for="email">Email address</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />
      <div class="hint">Use a strong password you don't use elsewhere.</div>
    </div>
    <div class="field">
      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Re-enter your password" autocomplete="new-password" />
    </div>

    <button class="btn-primary" id="submit-btn" onclick="register()">Create account</button>

    <div class="divider">or</div>
    <div class="login-link">Already have an account? <a id="login-link" href="/login-customer.html">Log in</a></div>
  </div>
</div>

<script>
  const params       = new URLSearchParams(location.search);
  const resultId     = params.get('resultId');
  const prefillEmail = params.get('email');

  if (prefillEmail) document.getElementById('email').value = decodeURIComponent(prefillEmail);

  if (resultId) {
    document.getElementById('audit-notice').style.display = 'block';
    document.getElementById('login-link').href =
      `/login-customer.html?resultId=${encodeURIComponent(resultId)}${prefillEmail ? '&email=' + encodeURIComponent(prefillEmail) : ''}`;
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function register() {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirm').value;
    const btn      = document.getElementById('submit-btn');
    document.getElementById('error-msg').style.display = 'none';

    if (!email || !password) return showError('Please fill in all fields.');
    if (password !== confirm) return showError('Passwords do not match.');
    if (password.length < 8) return showError('Password must be at least 8 characters.');

    btn.disabled = true;
    btn.innerHTML = '<span class="spin"></span>Creating account...';

    try {
      const res  = await fetch('/api/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Registration failed');

      localStorage.setItem('rp_customer_token', data.token);
      localStorage.setItem('rp_customer_email', data.email);

      if (resultId) {
        try {
          await fetch('/api/link-audit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${data.token}` },
            body: JSON.stringify({ resultId }),
          });
        } catch { /* non-fatal */ }
      }

      location.href = '/dashboard.html';
    } catch (err) {
      showError(err.message);
      btn.disabled = false;
      btn.textContent = 'Create account';
    }
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
