<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Dashboard | RootACE</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,700;0,800;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #F5F0E8; --surface: #FAF7F2; --ink: #1A1A18; --ink-2: #3D3D3B;
      --mid: #6B6B67; --quiet: #9E9E9A; --faint: rgba(26,26,24,0.04);
      --border: rgba(26,26,24,0.1);
      --green: #1D9E75; --green-d: #723D22; --green-bg: rgba(29,158,117,0.08);
      --red: #C0392B; --red-bg: rgba(192,57,43,0.07);
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
      --mono: 'DM Mono', monospace;
    }
    body { font-family: var(--sans); background: var(--bg); color: var(--ink); -webkit-font-smoothing: antialiased; min-height: 100vh; }

    /* NAV */
    nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 48px; height: 60px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { font-family: var(--serif); font-size: 22px; font-style: italic; text-decoration: none; color: var(--ink); }
    .nav-logo em { font-style: normal; color: var(--green); }
    .nav-right { display: flex; align-items: center; gap: 20px; }
    .nav-email { font-size: 13px; color: var(--mid); }
    .nav-signout { font-size: 13px; color: var(--mid); background: none; border: none; cursor: pointer; padding: 0; }
    .nav-signout:hover { color: var(--ink); }

    /* LAYOUT */
    .wrap { max-width: 900px; margin: 0 auto; padding: 0 32px; }

    /* HEADER */
    .page-header { padding: 48px 0 36px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    .page-eyebrow { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--green); margin-bottom: 10px; }
    .page-title { font-family: var(--serif); font-size: 36px; margin-bottom: 6px; }
    .page-sub { color: var(--mid); font-size: 15px; }

    /* ACTION BAR */
    .action-bar { display: flex; gap: 12px; margin-bottom: 40px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 8px; font-family: var(--sans); font-size: 14px; font-weight: 500; cursor: pointer; text-decoration: none; border: 1px solid var(--border); background: var(--surface); color: var(--ink); transition: all 0.15s; }
    .btn:hover { border-color: var(--ink); }
    .btn.primary { background: var(--green); color: white; border-color: var(--green); }
    .btn.primary:hover { background: var(--green-d); border-color: var(--green-d); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* SECTION LABEL */
    .section-label { font-family: var(--mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--quiet); margin-bottom: 16px; }

    /* AUDIT CARDS */
    .audit-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 60px; }
    .audit-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px 28px; display: flex; align-items: center; justify-content: space-between;
      gap: 24px; transition: border-color 0.15s;
    }
    .audit-card:hover { border-color: rgba(26,26,24,0.25); }
    .audit-info { flex: 1; min-width: 0; }
    .audit-company { font-size: 17px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .audit-meta { font-size: 13px; color: var(--mid); }
    .audit-score { flex-shrink: 0; text-align: center; }
    .score-num { font-family: var(--mono); font-size: 28px; font-weight: 500; line-height: 1; }
    .score-label { font-size: 11px; color: var(--quiet); margin-top: 2px; }
    .score-high { color: var(--green); }
    .score-mid { color: #D97706; }
    .score-low { color: var(--red); }
    .audit-actions { flex-shrink: 0; }
    .view-btn { padding: 8px 16px; background: var(--faint); border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-weight: 500; color: var(--ink); text-decoration: none; transition: all 0.15s; white-space: nowrap; }
    .view-btn:hover { background: var(--ink); color: white; border-color: var(--ink); }

    /* PLAN BADGE */
    .plan-badge { display: inline-block; font-family: var(--mono); font-size: 10px; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 7px; border-radius: 4px; background: var(--green-bg); color: var(--green); margin-left: 8px; vertical-align: middle; }
    .plan-badge.snapshot { background: var(--faint); color: var(--quiet); }

    /* EMPTY STATE */
    .empty { text-align: center; padding: 64px 24px; color: var(--mid); }
    .empty-icon { font-size: 36px; margin-bottom: 16px; }
    .empty-title { font-family: var(--serif); font-size: 22px; color: var(--ink); margin-bottom: 8px; }
    .empty-sub { font-size: 14px; line-height: 1.7; max-width: 380px; margin: 0 auto 24px; }

    /* LOADING */
    .loading { text-align: center; padding: 80px 24px; }
    .spin { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--mid); font-size: 14px; }

    /* ERROR */
    .error-banner { background: var(--red-bg); border: 1px solid rgba(192,57,43,0.2); color: var(--red); border-radius: 10px; padding: 14px 18px; font-size: 14px; margin-bottom: 24px; display: none; }

    /* PORTAL SPINNER overlay */
    .portal-loading { position: fixed; inset: 0; background: rgba(250,250,247,0.92); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    .portal-loading.active { display: flex; }
    .portal-loading .spin { width: 40px; height: 40px; }
    .portal-loading p { color: var(--mid); font-size: 14px; margin-top: 12px; }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/" style="font-family:var(--serif);font-size:22px;font-style:normal;text-decoration:none;color:var(--ink)"><span style="font-family:var(--serif);font-weight:700;font-style:normal;color:var(--ink)">Root</span><span style="font-family:var(--serif);font-weight:400;font-style:italic;color:#8B4A2A">ACE</span></a>
  <div class="nav-right">
    <span class="nav-email" id="nav-email"></span>
    <button class="nav-signout" onclick="signOut()">Sign out</button>
  </div>
</nav>

<div class="portal-loading" id="portal-loading">
  <div class="spin"></div>
  <p>Opening billing portal...</p>
</div>

<div class="wrap">
  <div class="page-header">
    <div class="page-eyebrow">My Account</div>
    <div class="page-title">Dashboard</div>
    <div class="page-sub" id="welcome-sub">Your audit reports and account settings.</div>
  </div>

  <div class="action-bar">
    <a class="btn primary" href="/order.html">+ Run a new audit</a>
    <button class="btn" id="billing-btn" onclick="openBillingPortal()">Manage billing</button>
  </div>

  <div id="error-banner" class="error-banner"></div>

  <div class="section-label">Your audits</div>

  <div id="loading" class="loading">
    <div class="spin"></div>
    <div class="loading-text">Loading your reports...</div>
  </div>

  <div id="audit-list" class="audit-list" style="display:none"></div>

  <div id="empty-state" class="empty" style="display:none">
    <div class="empty-icon">📊</div>
    <div class="empty-title">No audits yet</div>
    <div class="empty-sub">Run your first Competitive AI Audit to see where your brand stands in AI-driven search.</div>
    <a class="btn primary" href="/order.html">Run your first audit</a>
  </div>
</div>

<script>
  const token = localStorage.getItem('rp_customer_token');
  const email = localStorage.getItem('rp_customer_email');

  if (!token || !email) {
    location.href = '/login-customer.html';
  }

  document.getElementById('nav-email').textContent = email || '';

  function signOut() {
    localStorage.removeItem('rp_customer_token');
    localStorage.removeItem('rp_customer_email');
    location.href = '/login-customer.html';
  }

  function scoreClass(score) {
    if (score >= 60) return 'score-high';
    if (score >= 30) return 'score-mid';
    return 'score-low';
  }

  function formatDate(ts) {
    return new Date(ts).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  async function loadDashboard() {
    try {
      const res = await fetch('/api/dashboard-data', {
        headers: { 'Authorization': `Bearer ${token}` },
      });

      if (res.status === 401) {
        signOut();
        return;
      }

      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Could not load dashboard');

      document.getElementById('loading').style.display = 'none';

      if (!data.audits || data.audits.length === 0) {
        document.getElementById('empty-state').style.display = 'block';
        return;
      }

      const list = document.getElementById('audit-list');
      list.innerHTML = data.audits.map(a => `
        <div class="audit-card">
          <div class="audit-info">
            <div class="audit-company">
              ${escHtml(a.companyName)}
              <span class="plan-badge ${a.plan === 'active' ? 'active' : 'snapshot'}">${a.plan === 'active' ? 'Active' : 'Snapshot'}</span>
            </div>
            <div class="audit-meta">${a.industry ? escHtml(a.industry) + ' · ' : ''}${formatDate(a.createdAt)}</div>
          </div>
          <div class="audit-score">
            <div class="score-num ${scoreClass(a.score)}">${a.score}%</div>
            <div class="score-label">AI visibility</div>
          </div>
          <div class="audit-actions">
            <a class="view-btn" href="/audit-results.html?id=${encodeURIComponent(a.resultId)}">View report</a>
          </div>
        </div>
      `).join('');

      list.style.display = 'flex';
    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      showError(err.message);
    }
  }

  async function openBillingPortal() {
    const overlay = document.getElementById('portal-loading');
    overlay.classList.add('active');
    document.getElementById('error-banner').style.display = 'none';

    try {
      const res = await fetch('/api/customer-portal', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${token}`,
        },
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Could not open billing portal');
      location.href = data.url;
    } catch (err) {
      overlay.classList.remove('active');
      showError(err.message);
    }
  }

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadDashboard();
</script>
</body>
</html>
